<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self';
           script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com;
           style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
           font-src https://fonts.gstatic.com;
           connect-src 'self' https://worldtimeapi.org;
           img-src 'self' data: blob:;
           object-src 'none';
           base-uri 'self';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Exchange Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- APP SHELL: Loads login or dashboard based on session -->
  <div id="app-root">

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-logo">
        <div class="logo-hex">⬡</div>
        <div class="logo-text">Exchange<span>MS</span></div>
      </div>
      <div class="loading-bar"><div class="loading-fill"></div></div>
      <div class="loading-label">Initializing secure session…</div>
    </div>

    <!-- App Content -->
    <div id="app-content" style="display:none;"></div>

  </div>

  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script src="profile.js"></script>
  <script src="audit-log.js"></script>
  <script>
    // ── BOOT SEQUENCE ──
    window.addEventListener('DOMContentLoaded', async () => {
      const loading = document.getElementById('loading-screen');
      const content = document.getElementById('app-content');

      // 1. Init database
      await DB.init();

      // 2. Check if profile exists
      const profile = await Profile.get();

      // 3. Check session
      const session = Auth.checkSession();

      // Minimum loading display
      setTimeout(() => {
        loading.style.display = 'none';
        content.style.display = 'block';

        if (!profile) {
          // First time — go to setup
          window.location.href = 'setup-profile.html';
        } else if (!session) {
          // Not logged in — go to login
          window.location.href = 'login.html';
        } else {
          // Logged in — go to dashboard (Phase 06)
          window.location.href = 'dashboard.html';
        }
      }, 1200);
    });
  </script>
</body>
</html>
